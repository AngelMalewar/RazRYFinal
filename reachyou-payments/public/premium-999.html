<html>

<head>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<h2>Activating ReachYou Premium...</h2>

<script>

async function startPayment(){

  const uid = new URLSearchParams(location.search).get("uid");

  const response = await fetch(
    "https://reachyoupremiumapp.onrender.com/create-order",
    {
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({amount:1})
    }
  );

  const order = await response.json();

  const options = {

    key:"rzp_live_S9FJRpUQ8s5ixa",

    amount:order.amount,

    currency:"INR",

    order_id:order.id,

    name:"ReachYou Premium",

    description:"Premium subscription",

    callback_url:
    "https://reachyoupremiumapp.onrender.com/payment-success?uid=" + uid + "&days=60"

  };

  const rzp = new Razorpay(options);

  rzp.open();

}

startPayment();

</script>

</body>

</html>
