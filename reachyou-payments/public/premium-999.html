<html>

<head>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

    <h2>Activating ReachYou Premium...</h2>

    <script>

        async function startPayment() {

            const order = await fetch("/create-order", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: 1 })
            }).then(r => r.json());

            const options = {
  key:"rzp_live_xxx",
  amount:order.amount,
  currency:"INR",
  order_id:order.id,
  callback_url:
  "https://reachyoupremiumapp.onrender.com/payment-success?uid=" +
  new URLSearchParams(location.search).get("uid") +
  "&days=60"
};

            };

            const rzp = new Razorpay(options);
            rzp.open();

        }

        startPayment();

    </script>

</body>

</html>
